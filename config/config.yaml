# QuantzAI â€“ Hauptkonfiguration
# Alle Parameter hier â€“ kein Hardcoding im Code

data:
  symbols:
    - EURUSD
    - GBPUSD
    - USDJPY
  timeframes:
    - H1
    - H4
  history_years: 4

data_validation:
  max_missing_pct: 5.0
  outlier_atr_multiplier: 5.0
  min_quality_score: 0.95
  interpolation_method: linear
  max_gap_candles: 3

features:
  ema_periods: [9, 20, 50, 200]
  sma_periods: [20, 50]
  rsi_periods: [14]
  atr_period: 14
  bollinger_period: 20
  bollinger_std: 2
  include_time_features: true
  warmup_candles: 200
  include_sentiment: false

broker:
  primary: mt5
  fallback: oanda
  max_price_discrepancy_pips: 5

risk:
  max_risk_per_trade_pct: 1.0
  daily_loss_limit_pct: 5.0
  max_drawdown_pct: 15.0
  max_correlation: 0.8
  correlation_window_days: 60
  spread_filter_pips: 3.0

model:
  confidence_threshold: 0.55
  walk_forward_train_months: 6
  walk_forward_test_months: 1
  monte_carlo_permutations: 100
  save_dir: models
  lgbm_params:
    num_leaves: 31
    learning_rate: 0.05
    n_estimators: 100
    random_state: 42

# Multi-Konto-Konfiguration
# Login-Daten fuer jedes Konto stehen in .env, referenziert per account_id:
#   MT5_LOGIN_<ACCOUNT_ID>, MT5_PASSWORD_<ACCOUNT_ID>, MT5_SERVER_<ACCOUNT_ID>
accounts:
  - account_id: demo
    broker: mt5
    symbols:
      - EURUSD
      - GBPUSD
    risk:
      max_risk_per_trade_pct: 1.0
      daily_loss_limit_pct: 5.0
      max_drawdown_pct: 15.0
    paper_trading: true

  - account_id: live_1
    broker: mt5
    symbols:
      - EURUSD
      - USDJPY
    risk:
      max_risk_per_trade_pct: 0.5
      daily_loss_limit_pct: 3.0
      max_drawdown_pct: 10.0
    paper_trading: false

# Anomalie-Erkennung (Rogue-Bot-Schutz)
anomaly_detection:
  max_trades_per_window: 10          # Max. Trades im Zeitfenster
  frequency_window_seconds: 300      # Zeitfenster in Sekunden (5 Min)
  lot_size_multiplier: 3.0           # Vielfaches des Lots-Durchschnitts
  max_consecutive_rejections: 5      # Max. aufeinanderfolgende Ablehnungen
  max_signal_changes_per_minute: 3   # Max. Signalwechsel pro Minute
