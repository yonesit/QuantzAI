# QuantzAI - Hauptkonfiguration
# Alle Parameter hier - kein Hardcoding im Code

data:
  symbols:
    - EURUSD
    - GBPUSD
    - USDJPY
    - XAUUSD
  timeframes:
    - M5
    - M15
    - M30
    - H1
    - H4
  history_years: 4

data_validation:
  max_missing_pct: 7.0
  outlier_atr_multiplier: 5.0
  min_quality_score: 0.93
  interpolation_method: linear
  max_gap_candles: 3

features:
  ema_periods: [9, 20, 50, 200]
  sma_periods: [50]
  rsi_periods: [14]
  atr_period: 14
  bollinger_period: 20
  bollinger_std: 2
  include_time_features: true
  warmup_candles: 200
  include_sentiment: false
  sentiment_window_hours: 2.0  # Lookback-Fenster fuer GDELT-Sentiment (Stunden)
  mtf_adx_threshold: 25.0   # HTF-ADX muss >= Schwellwert (sonst h4/d1_trend=0)
  mtf_flip_lookback: 3       # Anzahl HTF-Bars fuer Vorzeichenwechsel-Erkennung

broker:
  primary: mt5
  fallback: oanda
  max_price_discrepancy_pips: 5

risk:
  max_risk_per_trade_pct: 1.0
  daily_loss_limit_pct: 5.0
  max_drawdown_pct: 15.0
  max_correlation: 0.8
  correlation_window_days: 60
  spread_filter_pips: 3.0
  # Pro-Symbol-Overrides fuer Pip-Groesse und Spread-Limit.
  # XAUUSD: point=0.01 (2 Dezimalstellen) -> pip_size=0.01; typischer Spread 30-100 Pips (= 0.30-1.00 USD)
  # USDJPY: point=0.001 (3 Dezimalstellen) -> pip_size=0.01
  symbol_spread_overrides:
    XAUUSD:
      pip_size: 0.01
      max_spread_pips: 100.0
    USDJPY:
      pip_size: 0.01
      max_spread_pips: 3.0
  # Pro-Symbol-Pip-Parameter fuer PositionSizer.
  # pip_size  : Pip-Groesse des Symbols (fuer SL/TP-Pip-Distanz-Berechnung)
  # pip_value : Naehrerungsweiser Pip-Wert pro Lot in der Kontowaehrung
  # XAUUSD: 100 Unzen * 0.01 USD/Pip = 1.00 USD/Pip/Lot
  # USDJPY: abhaengig vom JPY/USD-Kurs (Naehrerungswert)
  symbol_pip_params:
    XAUUSD:
      pip_size: 0.01
      pip_value: 1.0
    USDJPY:
      pip_size: 0.01
      pip_value: 7.0

  virtual_account_balance: 1000.0        # Effektives Risikokapital (1 % = 10 EUR Risiko/Trade)
  sl_atr_multiplier: 1.0                 # SL-Distanz (kleiner = engerer SL)
  tp_atr_multiplier: 2.0                 # TP-Distanz (2:1 RR, Ziel ~20 EUR)
  break_even_threshold: 0.35             # BE bei 35 % des TP-Weges (fruehzeitig sichern)
  break_even_spread_buffer_pips: 1.0     # BE-Puffer ueber Eroeffnung (Pips)

model:
  confidence_threshold: 0.55
  walk_forward_train_months: 6
  walk_forward_test_months: 1
  monte_carlo_permutations: 100
  save_dir: models
  lgbm_params:
    num_leaves: 31
    learning_rate: 0.05
    n_estimators: 100
    random_state: 42

# Multi-Konto-Konfiguration
# Login-Daten fuer jedes Konto stehen in .env, referenziert per account_id:
#   MT5_LOGIN_<ACCOUNT_ID>, MT5_PASSWORD_<ACCOUNT_ID>, MT5_SERVER_<ACCOUNT_ID>
accounts:
  - account_id: demo
    broker: mt5
    symbols:
      - EURUSD
      - GBPUSD
    risk:
      max_risk_per_trade_pct: 1.0
      daily_loss_limit_pct: 5.0
      max_drawdown_pct: 15.0
    paper_trading: true

  - account_id: live_1
    broker: mt5
    symbols:
      - EURUSD
      - USDJPY
    risk:
      max_risk_per_trade_pct: 0.5
      daily_loss_limit_pct: 3.0
      max_drawdown_pct: 10.0
    paper_trading: false

# Anomalie-Erkennung (Rogue-Bot-Schutz)
anomaly_detection:
  max_trades_per_window: 10          # Max. Trades im Zeitfenster
  frequency_window_seconds: 300      # Zeitfenster in Sekunden (5 Min)
  lot_size_multiplier: 3.0           # Vielfaches des Lots-Durchschnitts
  max_consecutive_rejections: 5      # Max. aufeinanderfolgende Ablehnungen
  max_signal_changes_per_minute: 3   # Max. Signalwechsel pro Minute
